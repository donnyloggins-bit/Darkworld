  <circle cx="256" cy="256" r="215" fill="none" stroke="#6b0000" stroke-width="2" stroke-dasharray="8 6"/>
  <circle cx="256" cy="256" r="185" fill="none" stroke="#3a0a0a" stroke-width="1"/>
